# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m  rate=100r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name flockiq.com *.flockiq.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name flockiq.com *.flockiq.com;

    ssl_certificate /etc/letsencrypt/live/flockiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flockiq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    limit_conn conn 50;
    client_max_body_size 20M;
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    access_log /www/wwwroot/flockiq/logs/nginx-access.log combined;
    error_log  /www/wwwroot/flockiq/logs/nginx-error.log warn;

    # Static files — served directly by Nginx
    location /static/ {
        alias /www/wwwroot/flockiq/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    location /media/ {
        alias /www/wwwroot/flockiq/media/;
        expires 7d;
        add_header Cache-Control "private";
    }

    # PWA service worker — must not be cached
    location = /sw.js {
        alias /www/wwwroot/flockiq/staticfiles/js/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Auth endpoints — strict rate limit
    location ~ ^/api/(auth|token)/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Paystack webhook — no rate limit (Paystack IP whitelist handles this)
    location /api/billing/webhook/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests
    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        client_max_body_size 10M;
    }
}
