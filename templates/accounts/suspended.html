{% extends "auth_base.html" %}

{% block title %}Account suspended — FlockIQ{% endblock %}

{% block content %}
  <div class="text-center">
    <div class="mx-auto w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mb-4">
      <svg class="w-6 h-6 text-red-600" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
    </div>

    <h1 class="text-xl font-extrabold text-[#1a2744] tracking-tight">
      Your account has been suspended
    </h1>

    <p class="text-sm text-gray-600 mt-3">
      If you believe this is an error, contact support:
    </p>
    <p class="mt-1">
      <a href="mailto:{{ support_email|default:'support@flockiq.com' }}"
         class="text-sm font-semibold text-[#3d5a99] hover:underline">
        {{ support_email|default:'support@flockiq.com' }}
      </a>
    </p>

    <a href="/login/"
       class="inline-block mt-6 text-sm font-semibold text-[#3d5a99] hover:underline">
      ← Back to FlockIQ
    </a>
  </div>
{% endblock %}
