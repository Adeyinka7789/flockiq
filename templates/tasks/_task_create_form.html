<div style="padding:14px 18px">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
    <div style="width:36px;height:36px;border-radius:10px;background:#e8eef8;
                display:flex;align-items:center;justify-content:center;
                flex-shrink:0;font-size:18px">📋</div>
    <div>
      <h3 style="font-size:14px;font-weight:800;color:#1a2744;margin-bottom:1px">
        Create Task
      </h3>
      <p style="font-size:11px;color:#8a96a8">Add a new task to your workflow</p>
    </div>
  </div>

  {% if error %}
  <div style="background:#fee2e2;color:#991b1b;padding:8px 12px;
              border-radius:8px;font-size:11px;margin-bottom:10px">
    {{ error }}
  </div>
  {% endif %}

  <form hx-post="{% url 'tasks:create' %}"
        hx-target="#modal-body"
        hx-swap="innerHTML"
        hx-indicator="#htmx-spinner">
    {% csrf_token %}

    <div style="margin-bottom:6px">
      <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                    margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em">
        Task Title *
      </label>
      <input type="text" name="title" required
             placeholder="e.g. Vaccination — House A"
             style="width:100%;padding:6px 10px;border:1.5px solid #e2e8f0;
                    border-radius:8px;font-size:13px;box-sizing:border-box;outline:none"
             onfocus="this.style.borderColor='#3d5a99'"
             onblur="this.style.borderColor='#e2e8f0'">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                      margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em">
          Category
        </label>
        <select name="category"
                style="width:100%;padding:6px 10px;border:1.5px solid #e2e8f0;
                       border-radius:8px;font-size:13px;box-sizing:border-box;
                       background:white;outline:none"
                onfocus="this.style.borderColor='#3d5a99'"
                onblur="this.style.borderColor='#e2e8f0'">
          <option value="medication">💊 Medication</option>
          <option value="nutrition">🌾 Nutrition</option>
          <option value="maintenance">🔧 Maintenance</option>
          <option value="environmental">🌿 Environmental</option>
          <option value="health">❤️ Health</option>
          <option value="production">📦 Production</option>
          <option value="finance">💰 Finance</option>
          <option value="other" selected>📋 Other</option>
        </select>
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                      margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em">
          Priority
        </label>
        <select name="priority"
                style="width:100%;padding:6px 10px;border:1.5px solid #e2e8f0;
                       border-radius:8px;font-size:13px;box-sizing:border-box;
                       background:white;outline:none"
                onfocus="this.style.borderColor='#3d5a99'"
                onblur="this.style.borderColor='#e2e8f0'">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>

    <div style="margin-bottom:6px">
      <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                    margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em">
        Description (optional)
      </label>
      <textarea name="description" rows="2"
                placeholder="What needs to be done?"
                style="width:100%;padding:6px 10px;border:1.5px solid #e2e8f0;
                       border-radius:8px;font-size:13px;resize:vertical;
                       box-sizing:border-box;outline:none"
                onfocus="this.style.borderColor='#3d5a99'"
                onblur="this.style.borderColor='#e2e8f0'"></textarea>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                      margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em">
          Due Date
        </label>
        <input type="date" name="due_date"
               value="{{ today|date:'Y-m-d' }}"
               style="width:100%;padding:6px 10px;border:1.5px solid #e2e8f0;
                      border-radius:8px;font-size:13px;box-sizing:border-box;outline:none"
               onfocus="this.style.borderColor='#3d5a99'"
               onblur="this.style.borderColor='#e2e8f0'">
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                      margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em">
          Assign To
        </label>
        <select name="assigned_to"
                style="width:100%;padding:6px 10px;border:1.5px solid #e2e8f0;
                       border-radius:8px;font-size:13px;box-sizing:border-box;
                       background:white;outline:none"
                onfocus="this.style.borderColor='#3d5a99'"
                onblur="this.style.borderColor='#e2e8f0'">
          <option value="">Unassigned</option>
          {% for member in team %}
          <option value="{{ member.pk }}">
            {{ member.get_full_name|default:member.email }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                      margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em">
          Farm (optional)
        </label>
        <select name="farm"
                style="width:100%;padding:6px 10px;border:1.5px solid #e2e8f0;
                       border-radius:8px;font-size:13px;box-sizing:border-box;
                       background:white;outline:none">
          <option value="">No specific farm</option>
          {% for farm in farms %}
          <option value="{{ farm.pk }}">{{ farm.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                      margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em">
          Batch (optional)
        </label>
        <select name="batch"
                style="width:100%;padding:6px 10px;border:1.5px solid #e2e8f0;
                       border-radius:8px;font-size:13px;box-sizing:border-box;
                       background:white;outline:none">
          <option value="">No specific batch</option>
          {% for batch in batches %}
          <option value="{{ batch.pk }}">
            {{ batch.batch_name }} — {{ batch.farm.name }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div style="display:flex;gap:10px">
      <button type="button" onclick="closeModal()"
              style="flex:1;padding:9px;background:#f4f7fe;color:#4a5568;
                     border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;
                     font-weight:600;cursor:pointer">
        Cancel
      </button>
      <button type="submit"
              style="flex:2;padding:9px;background:#3d5a99;color:white;border:none;
                     border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;
                     transition:background 0.15s"
              onmouseover="this.style.background='#2d4578'"
              onmouseout="this.style.background='#3d5a99'"
              hx-disabled-elt="this">
        Create Task
      </button>
    </div>
  </form>
</div>
