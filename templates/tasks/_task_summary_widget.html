<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0">
  <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 4px;text-align:center;min-width:0;overflow:hidden">
    <p style="font-size:20px;font-weight:800;line-height:1;color:#b45309">{{ pending_count }}</p>
    <p style="font-size:10px;font-weight:600;margin-top:3px;color:#d97706;word-break:break-word">Pending</p>
  </div>
  <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 4px;text-align:center;min-width:0;overflow:hidden">
    <p style="font-size:20px;font-weight:800;line-height:1;color:#dc2626">{{ overdue_count }}</p>
    <p style="font-size:10px;font-weight:600;margin-top:3px;color:#ef4444;word-break:break-word">Overdue</p>
  </div>
  <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 4px;text-align:center;min-width:0;overflow:hidden">
    <p style="font-size:20px;font-weight:800;line-height:1;color:#16a34a">{{ completed_today_count }}</p>
    <p style="font-size:10px;font-weight:600;margin-top:3px;color:#22c55e;word-break:break-word">Done Today</p>
  </div>
</div>
