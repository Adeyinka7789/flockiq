<div class="flex gap-3">
  <div class="flex-1 rounded-lg bg-amber-50 border border-amber-200 px-3 py-2 text-center">
    <p class="text-xl font-bold text-amber-700">{{ pending_count }}</p>
    <p class="text-xs text-amber-600">Pending</p>
  </div>
  <div class="flex-1 rounded-lg bg-red-50 border border-red-200 px-3 py-2 text-center">
    <p class="text-xl font-bold text-red-700">{{ overdue_count }}</p>
    <p class="text-xs text-red-600">Overdue</p>
  </div>
  <div class="flex-1 rounded-lg bg-green-50 border border-green-200 px-3 py-2 text-center">
    <p class="text-xl font-bold text-green-700">{{ completed_today_count }}</p>
    <p class="text-xs text-green-600">Done Today</p>
  </div>
</div>
