{% extends "base.html" %}
{% load static %}
{% block title %}Expenses{% endblock %}
{% block breadcrumb %}Expense Records{% endblock %}

{% block content %}
<style>
  .exp-wrap { max-width: 1100px; margin: 0 auto; }

  .exp-eyebrow {
    font-size: 11px; font-weight: 700; color: #8a96a8;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .exp-title {
    font-size: 28px; font-weight: 800; color: #1a2744;
    letter-spacing: -0.5px; margin-bottom: 16px;
  }

  .exp-filters {
    display: flex; align-items: center;
    gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .exp-filter-select {
    padding: 9px 14px;
    background: white; border: 1.5px solid #e2e8f0;
    border-radius: 10px; font-size: 13px;
    color: #1a2744; cursor: pointer; outline: none;
    font-weight: 500; transition: all 0.15s;
  }
  .exp-filter-select:focus {
    border-color: #3d5a99;
    box-shadow: 0 0 0 3px rgba(61,90,153,0.1);
  }
  .filter-preset-group { display: flex; gap: 4px; }
  .filter-preset {
    padding: 8px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #e2e8f0;
    background: white; color: #4a5568; transition: all 0.15s;
  }
  .filter-preset.active {
    background: #3d5a99; color: white; border-color: #3d5a99;
  }

  .exp-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
  }

  .exp-trend-card {
    background: white; border: 1px solid #e2e8f0;
    border-radius: 16px; padding: 24px; margin-bottom: 16px;
  }
  .exp-trend-eyebrow {
    font-size: 10px; font-weight: 700; color: #8a96a8;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .exp-total {
    font-size: 36px; font-weight: 800; color: #1a2744;
    line-height: 1; font-variant-numeric: tabular-nums;
    margin-bottom: 4px; letter-spacing: -1px;
  }
  .exp-change { font-size: 13px; font-weight: 600; margin-bottom: 20px; }
  .exp-change.up { color: #dc2626; }
  .exp-change.down { color: #16a34a; }
  .exp-change.neutral { color: #8a96a8; }

  .bar-chart {
    display: flex; align-items: flex-end;
    gap: 12px; height: 160px; padding-top: 20px;
  }
  .bar-col {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 8px; height: 100%; justify-content: flex-end;
  }
  .bar-fill {
    width: 100%; border-radius: 6px 6px 0 0;
    background: #d4dff5; transition: height 0.6s ease;
    min-height: 4px; cursor: pointer;
  }
  .bar-fill.current { background: #1e3a8a; }
  .bar-fill:hover { opacity: 0.85; }
  .bar-label {
    font-size: 10px; font-weight: 700; color: #8a96a8;
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  .exp-log-card {
    background: white; border: 1px solid #e2e8f0;
    border-radius: 16px; overflow: hidden;
  }
  .exp-log-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid #f1f5f9;
  }
  .exp-log-title {
    font-size: 13px; font-weight: 700; color: #1a2744;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .exp-csv-btn {
    font-size: 12px; font-weight: 600; color: #3d5a99;
    text-decoration: none; display: flex; align-items: center; gap: 5px;
  }
  .exp-csv-btn:hover { text-decoration: underline; }

  .exp-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px; border-bottom: 1px solid #f8faff;
    transition: background 0.1s;
  }
  .exp-row:last-child { border-bottom: none; }
  .exp-row:hover { background: #fafbff; }
  .exp-row-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 16px;
  }
  .exp-row-info { flex: 1; min-width: 0; }
  .exp-row-name {
    font-size: 13px; font-weight: 600; color: #1a2744;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .exp-row-meta { font-size: 11px; color: #8a96a8; margin-top: 2px; }
  .exp-row-amount {
    font-size: 14px; font-weight: 800; color: #1a2744;
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .exp-status {
    padding: 3px 10px; border-radius: 20px;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
    background: #dcfce7; color: #166534;
  }

  .breakeven-card {
    background: linear-gradient(160deg, #1e3a8a, #2d5be3);
    border-radius: 16px; padding: 22px; color: white; margin-bottom: 16px;
  }
  .breakeven-title { font-size: 15px; font-weight: 800; color: white; margin-bottom: 6px; }
  .breakeven-sub {
    font-size: 12px; color: rgba(255,255,255,0.6);
    margin-bottom: 20px; line-height: 1.5;
  }
  .breakeven-field { margin-bottom: 14px; }
  .breakeven-label {
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .breakeven-input-wrap {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 10px 14px;
  }
  .breakeven-prefix { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.5); }
  .breakeven-input {
    flex: 1; background: transparent; border: none;
    color: white; font-size: 16px; font-weight: 700;
    outline: none; font-variant-numeric: tabular-nums;
  }
  .breakeven-input::placeholder { color: rgba(255,255,255,0.3); }
  .breakeven-result {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 16px; margin-top: 16px;
  }
  .breakeven-result-label {
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .breakeven-result-val {
    font-size: 28px; font-weight: 800; color: #8bc87a; line-height: 1; margin-bottom: 4px;
  }
  .breakeven-result-sub { font-size: 11px; color: rgba(255,255,255,0.5); }
  .breakeven-bar {
    height: 6px; background: rgba(255,255,255,0.1);
    border-radius: 3px; margin-top: 10px; overflow: hidden;
  }
  .breakeven-bar-fill {
    height: 100%; background: #8bc87a;
    border-radius: 3px; transition: width 0.5s ease;
  }
  .breakeven-update-btn {
    width: 100%; padding: 12px;
    background: white; color: #1e3a8a;
    border: none; border-radius: 10px;
    font-size: 13px; font-weight: 800;
    cursor: pointer; margin-top: 14px;
    transition: all 0.15s; letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .breakeven-update-btn:hover { background: #e8eef8; transform: translateY(-1px); }

  .category-card {
    background: white; border: 1px solid #e2e8f0;
    border-radius: 14px; overflow: hidden; margin-bottom: 16px;
  }
  .category-card-hd {
    padding: 14px 18px; border-bottom: 1px solid #f1f5f9;
    font-size: 12px; font-weight: 700; color: #1a2744;
  }
  .cat-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px; border-bottom: 1px solid #f8faff;
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-label { flex: 1; font-size: 12px; font-weight: 600; color: #4a5568; text-transform: capitalize; }
  .cat-bar { flex: 2; height: 6px; background: #f0f4ff; border-radius: 3px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 3px; background: #3d5a99; }
  .cat-amount {
    font-size: 12px; font-weight: 700; color: #1a2744;
    min-width: 80px; text-align: right; font-variant-numeric: tabular-nums;
  }

  .empty-state { padding: 48px; text-align: center; color: #8a96a8; font-size: 13px; }

  @media(max-width:900px){ .exp-layout { grid-template-columns: 1fr; } }
</style>

<div class="exp-wrap">

  <div class="exp-eyebrow">Financial Overview</div>
  <div class="exp-title">Monitor your farm's burn rate.</div>

  <!-- Filters -->
  <div class="exp-filters" id="exp-filters">

    <select class="exp-filter-select"
            hx-get="{% url 'expenses:overview' %}"
            hx-target="#exp-content"
            hx-include="#exp-filters"
            hx-push-url="true"
            name="farm">
      <option value="">All Farms</option>
      {% for farm in farms %}
      <option value="{{ farm.pk }}" {% if active_farm == farm.pk|stringformat:"s" %}selected{% endif %}>
        {{ farm.name }}
      </option>
      {% endfor %}
    </select>

    <div class="filter-preset-group">
      <button class="filter-preset {% if active_preset == '7d' %}active{% endif %}"
              hx-get="{% url 'expenses:overview' %}"
              hx-vals='{"preset":"7d"}'
              hx-target="#exp-content"
              hx-include="#exp-filters"
              hx-push-url="true">7 days</button>
      <button class="filter-preset {% if active_preset == '30d' %}active{% endif %}"
              hx-get="{% url 'expenses:overview' %}"
              hx-vals='{"preset":"30d"}'
              hx-target="#exp-content"
              hx-include="#exp-filters"
              hx-push-url="true">Last 30 Days</button>
      <button class="filter-preset {% if active_preset == '90d' %}active{% endif %}"
              hx-get="{% url 'expenses:overview' %}"
              hx-vals='{"preset":"90d"}'
              hx-target="#exp-content"
              hx-include="#exp-filters"
              hx-push-url="true">90 days</button>
      <button class="filter-preset {% if active_preset == 'this_month' %}active{% endif %}"
              hx-get="{% url 'expenses:overview' %}"
              hx-vals='{"preset":"this_month"}'
              hx-target="#exp-content"
              hx-include="#exp-filters"
              hx-push-url="true">This Month</button>
    </div>

    <select class="exp-filter-select"
            hx-get="{% url 'expenses:overview' %}"
            hx-target="#exp-content"
            hx-include="#exp-filters"
            hx-push-url="true"
            name="category">
      <option value="">All Categories</option>
      {% for val, lbl in category_choices %}
      <option value="{{ val }}" {% if active_category == val %}selected{% endif %}>{{ lbl }}</option>
      {% endfor %}
    </select>

    <select class="exp-filter-select"
            hx-get="{% url 'expenses:overview' %}"
            hx-target="#exp-content"
            hx-include="#exp-filters"
            hx-push-url="true"
            name="batch">
      <option value="">All Batches</option>
      {% for b in batches %}
      <option value="{{ b.pk }}" {% if active_batch == b.pk|stringformat:"s" %}selected{% endif %}>
        {{ b.batch_name }} — {{ b.farm.name }}
      </option>
      {% endfor %}
    </select>

  </div>

  <div id="exp-content">
    {% include "finance/expenses/_expense_overview_partial.html" %}
  </div>

</div>
{% endblock %}
