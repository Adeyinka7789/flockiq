{% if success %}
<div style="padding:40px;text-align:center">
  <div style="width:56px;height:56px;background:#e8f5e9;border-radius:50%;
              display:flex;align-items:center;justify-content:center;
              margin:0 auto 16px;font-size:24px">✓</div>
  <h3 style="font-size:16px;font-weight:800;color:#1a2744;margin-bottom:8px">Sale Recorded</h3>
  <p style="font-size:13px;color:#8a96a8;margin-bottom:24px">
    Revenue of ₦{{ record.total_revenue_naira|floatformat:0 }} has been logged.
  </p>
  <button type="button"
          @click="$dispatch('close-modal')"
          style="padding:12px 32px;background:#3d5a99;color:white;border:none;
                 border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">
    Done
  </button>
</div>
{% else %}

<div style="padding:16px 20px 0">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <div style="width:40px;height:40px;border-radius:12px;
                background:#edfae8;display:flex;align-items:center;
                justify-content:center;flex-shrink:0;font-size:20px">
      💰
    </div>
    <div>
      <h3 style="font-size:15px;font-weight:800;color:#1a2744;margin-bottom:2px">Record Sale</h3>
      {% if batch %}
      <p style="font-size:11px;color:#8a96a8;margin:0">
        {{ batch.batch_name }} · {{ batch.farm.name }}
      </p>
      {% endif %}
    </div>
  </div>
</div>

<form hx-post="{% url 'finance:sale_log' batch_pk %}"
      hx-target="#modal-body"
      hx-swap="innerHTML"
      style="padding:0 20px 20px;display:flex;flex-direction:column;gap:10px"
      hx-indicator="#htmx-spinner">
  {% csrf_token %}

  {% if error %}
  <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;
              padding:10px 12px;font-size:12px;color:#dc2626">{{ error }}</div>
  {% endif %}

  <!-- Product type -->
  <div>
    <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                  margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">
      Product Type *
    </label>
    <select name="product_type" required
            style="width:100%;padding:9px 12px;
                   border:1.5px solid #e2e8f0;border-radius:9px;
                   font-size:13px;box-sizing:border-box;
                   background:white;outline:none"
            onfocus="this.style.borderColor='#3d5a99'"
            onblur="this.style.borderColor='#e2e8f0'">
      <option value="">Select product...</option>
      {% for value, label in product_types %}
      <option value="{{ value }}">{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- Quantity + Unit -->
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:10px">
    <div>
      <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                    margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">
        Quantity *
      </label>
      <input type="number" name="quantity" min="1" required inputmode="numeric"
             placeholder="0"
             style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;
                    border-radius:9px;font-size:13px;color:#1a2744;
                    box-sizing:border-box;outline:none"
             onfocus="this.style.borderColor='#3d5a99'"
             onblur="this.style.borderColor='#e2e8f0'">
    </div>
    <div>
      <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                    margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">
        Unit
      </label>
      <select name="unit"
              style="width:100%;padding:9px 8px;border:1.5px solid #e2e8f0;
                     border-radius:9px;font-size:13px;color:#1a2744;background:white;
                     box-sizing:border-box;outline:none"
              onfocus="this.style.borderColor='#3d5a99'"
              onblur="this.style.borderColor='#e2e8f0'">
        {% for value, label in units %}
        <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <!-- Unit price -->
  <div>
    <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                  margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">
      Unit Price (₦) *
    </label>
    <div style="position:relative">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);
                   font-size:13px;font-weight:700;color:#8a96a8">₦</span>
      <input type="number" name="unit_price" min="0" step="0.01" required
             inputmode="decimal" placeholder="0.00"
             style="width:100%;padding:9px 12px 9px 28px;border:1.5px solid #e2e8f0;
                    border-radius:9px;font-size:13px;font-weight:600;color:#1a2744;
                    box-sizing:border-box;outline:none"
             onfocus="this.style.borderColor='#3d5a99'"
             onblur="this.style.borderColor='#e2e8f0'">
    </div>
  </div>

  <!-- Buyer name + Sale date (2-col) -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div>
      <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                    margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">
        Buyer Name
      </label>
      <input type="text" name="buyer_name" placeholder="Optional"
             style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;
                    border-radius:9px;font-size:13px;color:#1a2744;
                    box-sizing:border-box;outline:none"
             onfocus="this.style.borderColor='#3d5a99'"
             onblur="this.style.borderColor='#e2e8f0'">
    </div>
    <div>
      <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                    margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">
        Sale Date
      </label>
      <input type="date" name="sale_date" value="{{ today|date:'Y-m-d' }}"
             style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;
                    border-radius:9px;font-size:13px;color:#1a2744;
                    box-sizing:border-box;outline:none"
             onfocus="this.style.borderColor='#3d5a99'"
             onblur="this.style.borderColor='#e2e8f0'">
    </div>
  </div>

  <!-- Actions -->
  <div style="display:flex;gap:10px;margin-top:2px">
    <button type="button"
            @click="$dispatch('close-modal')"
            style="flex:1;padding:11px;background:#f4f7fe;color:#4a5568;
                   border:1.5px solid #e2e8f0;border-radius:10px;
                   font-size:13px;font-weight:600;cursor:pointer">
      Cancel
    </button>
    <button type="submit"
            style="flex:2;padding:11px;background:#3d5a99;color:white;border:none;
                   border-radius:10px;font-size:13px;font-weight:700;cursor:pointer"
            onmouseover="this.style.background='#2d4578'"
            onmouseout="this.style.background='#3d5a99'"
        hx-disabled-elt="this">
      Record Sale
    </button>
  </div>
</form>

{% endif %}
