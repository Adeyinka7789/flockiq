{% if success %}
  <div class="p-3 bg-green-50 border border-green-200 rounded text-green-700 text-sm mb-2">
    Sale recorded: ₦{{ record.total_revenue_naira|floatformat:2 }}
  </div>
{% endif %}

{% if error %}
  <div class="p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm mb-2">{{ error }}</div>
{% endif %}

<form hx-post="{% url 'finance:sale_log' batch_pk %}"
      hx-target="this"
      hx-swap="outerHTML"
      class="space-y-3">
  {% csrf_token %}

  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Product Type</label>
      <select name="product_type" required
              class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500">
        <option value="">Select…</option>
        <option value="eggs">Eggs</option>
        <option value="live_birds">Live Birds</option>
        <option value="spent_layers">Spent Layers</option>
        <option value="manure">Manure</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Unit</label>
      <select name="unit" required
              class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500">
        <option value="crates">Crates</option>
        <option value="birds">Birds</option>
        <option value="kg">Kg</option>
        <option value="bags">Bags</option>
      </select>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
      <input type="number" name="quantity" step="0.01" min="0.01" required
             class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Unit Price (₦)</label>
      <input type="number" name="unit_price" step="0.01" min="0.01" required
             class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500">
    </div>
  </div>

  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Sale Date</label>
      <input type="date" name="sale_date"
             class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Buyer Name</label>
      <input type="text" name="buyer_name" maxlength="200"
             class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500">
    </div>
  </div>

  <button type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white text-sm font-medium py-2 px-4 rounded">
    Record Sale
  </button>
</form>
