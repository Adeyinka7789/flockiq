{% extends "base.html" %}

{% block title %}Batches — FlockIQ{% endblock %}
{% block breadcrumb %}Batches{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-8">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Batches</h1>
      <p class="text-sm text-gray-500 mt-1">All active production cycles</p>
    </div>
  </div>

  <div id="batch-list">
    {% include "flocks/_batch_list_partial.html" %}
  </div>

</div>
<div id="modal-container"></div>
<div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>
<script>
  document.body.addEventListener("showToast", function(evt) {
    const { message, type } = evt.detail;
    const bg = type === "success" ? "bg-green-600" : "bg-red-600";
    const toast = document.createElement("div");
    toast.className = `${bg} text-white text-sm px-4 py-3 rounded-lg shadow-lg`;
    toast.textContent = message;
    document.getElementById("toast-container").appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  });
</script>
{% endblock %}
