{% extends "base.html" %}

{% block title %}Batches — FlockIQ{% endblock %}
{% block breadcrumb %}Batches{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-8">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-earth-900">Batches</h1>
      <p class="text-sm text-earth-500 mt-1">All active production cycles</p>
    </div>
    <a href="{% url 'farms:list' %}"
       class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-white"
       style="background:#3d5a99">
      + New Batch
    </a>
  </div>

  <!-- Filter bar -->
  <form id="batch-filter-form"
        style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px">

    <!-- Farm filter -->
    <select name="farm"
            hx-get="{% url 'flocks:list' %}"
            hx-include="#batch-filter-form"
            hx-target="#batch-list"
            hx-push-url="true"
            hx-trigger="change"
            style="padding:7px 12px;border:1.5px solid #e2e8f0;border-radius:8px;
                   font-size:12px;color:#1a2744;background:white;cursor:pointer">
      <option value="">All Farms</option>
      {% for farm in farms %}
      <option value="{{ farm.pk }}"
              {% if active_farm == farm.pk|stringformat:'s' %}selected{% endif %}>
        {{ farm.name }}
      </option>
      {% endfor %}
    </select>

    <!-- Bird type filter -->
    <select name="bird_type"
            hx-get="{% url 'flocks:list' %}"
            hx-include="#batch-filter-form"
            hx-target="#batch-list"
            hx-push-url="true"
            hx-trigger="change"
            style="padding:7px 12px;border:1.5px solid #e2e8f0;border-radius:8px;
                   font-size:12px;color:#1a2744;background:white;cursor:pointer">
      <option value="">All Types</option>
      <option value="layer" {% if active_bird_type == 'layer' %}selected{% endif %}>Layers</option>
      <option value="broiler" {% if active_bird_type == 'broiler' %}selected{% endif %}>Broilers</option>
    </select>

    <!-- Status filter -->
    <select name="status"
            hx-get="{% url 'flocks:list' %}"
            hx-include="#batch-filter-form"
            hx-target="#batch-list"
            hx-push-url="true"
            hx-trigger="change"
            style="padding:7px 12px;border:1.5px solid #e2e8f0;border-radius:8px;
                   font-size:12px;color:#1a2744;background:white;cursor:pointer">
      <option value="active" {% if active_status == 'active' %}selected{% endif %}>Active</option>
      <option value="closed" {% if active_status == 'closed' %}selected{% endif %}>Closed</option>
      <option value="all" {% if active_status == 'all' %}selected{% endif %}>All</option>
    </select>

  </form>

  <div id="batch-list" class="bg-white rounded-xl border border-earth-200 shadow-sm overflow-hidden">
    {% include "flocks/_batch_list_partial.html" %}
  </div>

</div>
<div id="modal-container"></div>
<div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>
<script>
  document.body.addEventListener("showToast", function(evt) {
    const { message, type } = evt.detail;
    const bg = type === "success" ? "bg-green-600" : "bg-red-600";
    const toast = document.createElement("div");
    toast.className = `${bg} text-white text-sm px-4 py-3 rounded-lg shadow-lg`;
    toast.textContent = message;
    document.getElementById("toast-container").appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  });
</script>
{% endblock %}
