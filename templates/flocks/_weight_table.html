{% if records %}
<div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden mt-4">
  <table class="min-w-full divide-y divide-gray-100">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Sample</th>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Avg (kg)</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-50">
      {% for record in records %}
      <tr>
        <td class="px-4 py-2 text-sm text-gray-700">{{ record.sample_date }}</td>
        <td class="px-4 py-2 text-sm tabular-nums text-gray-500">{{ record.sample_size }}</td>
        <td class="px-4 py-2 text-sm font-bold tabular-nums text-gray-900">{{ record.avg_weight_kg }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p class="text-sm text-gray-400 mt-4">No weight records yet.</p>
{% endif %}
