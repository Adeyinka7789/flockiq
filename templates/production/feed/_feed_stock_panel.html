<div id="feed-stock-panel" class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
  <h3 class="text-sm font-semibold text-gray-700 mb-4">Feed Stock Levels</h3>
  {% if stocks %}
  <div class="space-y-3">
    {% for stock in stocks %}
    <div class="flex items-center justify-between p-3 rounded-lg
      {% if stock.is_low_stock %}bg-red-50 border border-red-200{% else %}bg-gray-50{% endif %}">
      <div>
        <p class="text-sm font-medium text-gray-800">{{ stock.get_feed_type_display }}</p>
        <p class="text-xs text-gray-500">Threshold: {{ stock.low_stock_threshold_kg }} kg</p>
      </div>
      <div class="text-right">
        <p class="text-lg font-bold tabular-nums
          {% if stock.is_low_stock %}text-red-600{% else %}text-gray-900{% endif %}">
          {{ stock.quantity_kg }} kg
        </p>
        {% if stock.is_low_stock %}
        <span class="inline-block text-xs font-medium text-red-600 bg-red-100 px-2 py-0.5 rounded-full">Low Stock</span>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p class="text-sm text-gray-400 text-center py-6">No stock records yet.</p>
  {% endif %}
</div>
