{% extends "base.html" %}
{% load static %}
{% block title %}Egg Production{% endblock %}
{% block breadcrumb %}Egg Production{% endblock %}

{% block content %}
<style>
  .prod-wrap { max-width: 1100px; margin: 0 auto; }

  /* Header */
  .prod-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .prod-batch-selector {
    display: flex; align-items: center; gap: 10px;
  }
  .prod-batch-label {
    font-size: 11px; font-weight: 700; color: #8a96a8;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .prod-batch-select {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; background: white;
    border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-size: 14px; font-weight: 700; color: #1a2744;
    cursor: pointer; outline: none;
  }
  .prod-batch-select:focus { border-color: #3d5a99; }

  .prod-presets {
    display: flex; gap: 4px;
  }
  .prod-preset {
    padding: 7px 12px; border-radius: 8px;
    font-size: 12px; font-weight: 600;
    border: 1.5px solid #e2e8f0; background: white;
    color: #4a5568; cursor: pointer; transition: all 0.15s;
  }
  .prod-preset.active {
    background: #3d5a99; color: white; border-color: #3d5a99;
  }

  /* Metric cards */
  .prod-metrics {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px; margin-bottom: 20px;
  }
  .prod-metric {
    background: white; border: 1px solid #e2e8f0;
    border-radius: 14px; padding: 18px;
    position: relative; overflow: hidden;
  }
  .prod-metric-badge {
    position: absolute; top: 14px; right: 14px;
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    border-radius: 20px;
  }
  .prod-metric-badge.live {
    background: #edfae8; color: #166534;
  }
  .prod-metric-icon {
    width: 32px; height: 32px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }
  .prod-metric-lbl {
    font-size: 11px; font-weight: 700; color: #8a96a8;
    text-transform: uppercase; letter-spacing: 0.07em;
    margin-bottom: 6px;
  }
  .prod-metric-val {
    font-size: 28px; font-weight: 800; color: #1a2744;
    line-height: 1; font-variant-numeric: tabular-nums;
    margin-bottom: 4px;
  }
  .prod-metric-sub {
    font-size: 12px; color: #8a96a8;
    display: flex; align-items: center; gap: 4px;
  }
  .prod-metric-sub.green { color: #16a34a; }
  .prod-metric-sub.amber { color: #d97706; }
  .prod-metric-sub.red   { color: #dc2626; }

  /* Two column layout */
  .prod-layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
  }
  .prod-main { min-width: 0; }

  /* Chart card */
  .prod-chart-card {
    background: white; border: 1px solid #e2e8f0;
    border-radius: 14px; overflow: hidden;
    margin-bottom: 16px;
  }
  .prod-chart-hd {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #f1f5f9;
  }
  .prod-chart-title {
    font-size: 14px; font-weight: 700; color: #1a2744;
    margin-bottom: 2px;
  }
  .prod-chart-sub {
    font-size: 12px; color: #8a96a8;
  }
  .prod-chart-legend {
    display: flex; align-items: center; gap: 14px;
    font-size: 11px; font-weight: 600;
  }
  .prod-legend-item {
    display: flex; align-items: center; gap: 5px;
    color: #4a5568;
  }
  .prod-legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .prod-legend-dash {
    width: 16px; height: 2px; border-top: 2px dashed;
  }
  .prod-chart-body { padding: 16px; height: 220px; }

  /* Daily records table */
  .prod-table-card {
    background: white; border: 1px solid #e2e8f0;
    border-radius: 14px; overflow: hidden;
  }
  .prod-table-hd {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid #f1f5f9;
  }
  .prod-table-title {
    font-size: 14px; font-weight: 700; color: #1a2744;
    margin-bottom: 2px;
  }
  .prod-table-sub {
    font-size: 11px; color: #8a96a8;
  }
  .prod-csv-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; color: #3d5a99;
    text-decoration: none;
  }
  .prod-csv-btn:hover { text-decoration: underline; }
  .prod-table { width: 100%; border-collapse: collapse; }
  .prod-table th {
    text-align: left; padding: 10px 16px;
    font-size: 10px; font-weight: 700; color: #8a96a8;
    text-transform: uppercase; letter-spacing: 0.07em;
    background: #fafafa; border-bottom: 1px solid #e2e8f0;
  }
  .prod-table td {
    padding: 12px 16px; font-size: 13px;
    border-bottom: 1px solid #f8faff; color: #1a2744;
  }
  .prod-table tr:last-child td { border-bottom: none; }
  .prod-table tr:hover td { background: #fafbff; }
  .td-cracked { color: #dc2626; font-weight: 600; }
  .td-hen-day { color: #16a34a; font-weight: 700; }
  .td-hen-day.amber { color: #d97706; }

  /* Sidebar */
  .prod-ai-card {
    background: linear-gradient(160deg, #1e3a8a, #2d5be3);
    border-radius: 14px; padding: 20px; color: white;
    margin-bottom: 14px;
  }
  .prod-ai-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 800; color: white;
    margin-bottom: 4px;
  }
  .prod-ai-sub {
    font-size: 11px; color: rgba(255,255,255,0.5);
    margin-bottom: 16px;
  }
  .prod-ai-stat-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 16px;
  }
  .prod-ai-stat {
    background: rgba(255,255,255,0.08);
    border-radius: 10px; padding: 12px;
  }
  .prod-ai-stat-lbl {
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .prod-ai-stat-val {
    font-size: 20px; font-weight: 800; color: white;
    line-height: 1; font-variant-numeric: tabular-nums;
  }
  .prod-ai-rec-label {
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .prod-ai-rec {
    display: flex; gap: 8px; align-items: flex-start;
    margin-bottom: 8px; font-size: 12px;
    color: rgba(255,255,255,0.8); line-height: 1.5;
  }
  .prod-ai-rec-dot {
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; font-size: 8px;
  }
  .prod-ai-rec-dot.good { background: #8bc87a; }
  .prod-ai-rec-dot.warning { background: #f59e0b; }

  .prod-resource-card {
    background: white; border: 1px solid #e2e8f0;
    border-radius: 14px; overflow: hidden;
    margin-bottom: 14px;
  }
  .prod-resource-hd {
    padding: 12px 16px; border-bottom: 1px solid #f1f5f9;
    font-size: 12px; font-weight: 700; color: #1a2744;
  }
  .prod-resource-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid #f8faff;
    gap: 12px;
  }
  .prod-resource-row:last-child { border-bottom: none; }
  .prod-resource-name {
    font-size: 12px; color: #4a5568; font-weight: 500;
    min-width: 100px;
  }
  .prod-resource-bar {
    flex: 1; height: 6px; background: #f0f4ff;
    border-radius: 3px; overflow: hidden;
  }
  .prod-resource-fill {
    height: 100%; border-radius: 3px;
    background: #3d5a99; transition: width 0.6s ease;
  }
  .prod-resource-fill.green { background: #8bc87a; }
  .prod-resource-fill.amber { background: #f59e0b; }
  .prod-resource-val {
    font-size: 12px; font-weight: 700; color: #1a2744;
    min-width: 50px; text-align: right;
  }

  .empty-state {
    padding: 48px; text-align: center;
    color: #8a96a8; font-size: 13px;
  }

  @media(max-width:900px){
    .prod-layout { grid-template-columns: 1fr; }
    .prod-metrics { grid-template-columns: 1fr 1fr; }
  }
</style>

<div class="prod-wrap">

  <!-- Header: batch selector + date presets -->
  <div class="prod-header" id="prod-filters">
    <div class="prod-batch-selector">
      <span class="prod-batch-label">Current Batch</span>
      <select class="prod-batch-select"
              name="batch"
              hx-get="{% url 'production:overview' %}"
              hx-target="#prod-content"
              hx-include="#prod-filters"
              hx-push-url="true">
        <option value="">All Layer Batches</option>
        {% for b in layer_batches %}
        <option value="{{ b.pk }}"
                {% if active_batch and active_batch.pk == b.pk %}selected{% endif %}>
          {{ b.batch_name }} — {{ b.farm.name }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="prod-presets">
        <button class="prod-preset {% if active_preset == 'today' %}active{% endif %}"
                hx-get="{% url 'production:overview' %}"
                hx-vals='{"preset":"today"}'
                hx-target="#prod-content"
                hx-include="#prod-filters"
                hx-push-url="true">Today</button>
        <button class="prod-preset {% if active_preset == '7d' or not active_preset %}active{% endif %}"
                hx-get="{% url 'production:overview' %}"
                hx-vals='{"preset":"7d"}'
                hx-target="#prod-content"
                hx-include="#prod-filters"
                hx-push-url="true">7 days</button>
        <button class="prod-preset {% if active_preset == '30d' %}active{% endif %}"
                hx-get="{% url 'production:overview' %}"
                hx-vals='{"preset":"30d"}'
                hx-target="#prod-content"
                hx-include="#prod-filters"
                hx-push-url="true">30 days</button>
        <button class="prod-preset {% if active_preset == '90d' %}active{% endif %}"
                hx-get="{% url 'production:overview' %}"
                hx-vals='{"preset":"90d"}'
                hx-target="#prod-content"
                hx-include="#prod-filters"
                hx-push-url="true">90 days</button>
      </div>
    </div>
  </div>

  <div id="prod-content">
    {% include 'production/production/_production_overview_partial.html' %}
  </div>

</div>
{% endblock %}
