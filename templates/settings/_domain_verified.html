{# STATE 3 — domain verified and active. #}
<div class="bg-green-50 border border-green-200 rounded-xl p-5">
  <div class="flex items-center gap-2 mb-2">
    <svg class="w-5 h-5 text-green-600" fill="none" viewBox="0 0 24 24"
         stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <span class="font-semibold text-green-800">
      {{ org.custom_domain }} is active
    </span>
  </div>
  <p class="text-sm text-green-700">
    Your dashboard is accessible at
    <a href="https://{{ org.custom_domain }}" class="underline font-medium">
      {{ org.custom_domain }}
    </a>
  </p>
  <button hx-post="{% url 'tenants:remove_custom_domain' %}"
          hx-confirm="Remove this custom domain?"
          hx-target="#domain-status"
          hx-swap="innerHTML"
          class="mt-3 text-sm text-red-600 hover:underline">
    Remove custom domain
  </button>
</div>
