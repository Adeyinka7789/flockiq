<div class="overflow-x-auto">
  <table class="min-w-full divide-y divide-gray-200 text-sm">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
        <th class="px-4 py-2 text-right text-xs font-medium text-gray-500 uppercase">Amount (₦)</th>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Description</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {% for expense in expenses %}
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-2 text-gray-600">{{ expense.expense_date }}</td>
        <td class="px-4 py-2">
          <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">
            {{ expense.get_category_display }}
          </span>
        </td>
        <td class="px-4 py-2 text-right font-medium text-gray-800">
          {{ expense.amount_naira|floatformat:2 }}
        </td>
        <td class="px-4 py-2 text-gray-600">{{ expense.description }}</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="4" class="px-4 py-6 text-center text-gray-400 text-sm">No expenses recorded yet.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
