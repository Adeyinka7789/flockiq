{% if success %}
  <div class="p-3 bg-green-50 border border-green-200 rounded text-green-700 text-sm mb-2">
    Expense recorded: ₦{{ record.amount_naira|floatformat:2 }} ({{ record.get_category_display }})
  </div>
{% endif %}

{% if error %}
  <div class="p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm mb-2">{{ error }}</div>
{% endif %}

<form hx-post="{% url 'expenses:log' batch_pk %}"
      hx-target="this"
      hx-swap="outerHTML"
      class="space-y-3">
  {% csrf_token %}
  <input type="hidden" name="batch_id" value="{{ batch_pk }}">

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
    <select name="category" required
            class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500 focus:border-indigo-500">
      <option value="">Select category…</option>
      <option value="feed">Feed</option>
      <option value="medication">Medication</option>
      <option value="labour">Labour</option>
      <option value="utilities">Utilities</option>
      <option value="equipment">Equipment</option>
      <option value="chicks">Chicks / Day-Old Birds</option>
      <option value="transport">Transport</option>
      <option value="veterinary">Veterinary</option>
      <option value="packaging">Packaging</option>
      <option value="other">Other</option>
    </select>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Amount (₦)</label>
    <input type="number" name="amount" step="0.01" min="0.01" required
           class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500"
           placeholder="0.00">
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
    <input type="text" name="description" required maxlength="300"
           class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500"
           placeholder="What was this expense for?">
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
    <input type="date" name="expense_date"
           class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500">
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Receipt Ref (optional)</label>
    <input type="text" name="receipt_ref" maxlength="100"
           class="w-full rounded border-gray-300 shadow-sm text-sm focus:ring-indigo-500">
  </div>

  <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 px-4 rounded">
    Log Expense
  </button>
</form>
