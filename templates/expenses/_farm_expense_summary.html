<div class="p-4 bg-white rounded-lg shadow-sm border border-gray-200">
  <h3 class="text-sm font-semibold text-gray-700 mb-3">Farm Expense Summary</h3>
  <div class="text-2xl font-bold text-gray-900 mb-4">
    ₦{{ summary.grand_total_naira|floatformat:2 }}
  </div>
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-gray-200">
        <th class="text-left pb-1 text-gray-500 font-medium">Category</th>
        <th class="text-right pb-1 text-gray-500 font-medium">Amount (₦)</th>
      </tr>
    </thead>
    <tbody>
      {% for item in summary.by_category %}
      <tr class="border-b border-gray-50">
        <td class="py-1 text-gray-700">{{ item.category }}</td>
        <td class="py-1 text-right text-gray-800 font-medium">{{ item.total|floatformat:0 }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="2" class="py-3 text-center text-gray-400">No expenses yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
