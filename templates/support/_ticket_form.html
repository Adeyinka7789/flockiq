<div class="p-6">
  <div class="flex items-center gap-3 mb-5">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg"
         style="background:#edfae8;">
      🐣
    </div>
    <div>
      <h3 class="text-base font-700 text-earth-900" style="font-weight:700">Report an Issue</h3>
      <p class="text-xs text-earth-500">We'll respond as soon as possible.</p>
    </div>
  </div>

  {% if error %}
  <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium"
       style="background:#fee2e2;color:#dc2626;border:1px solid #fecaca;">
    {{ error }}
  </div>
  {% endif %}

  <form hx-post="{% url 'notifications:submit_support_ticket' %}"
        hx-target="#support-modal-body"
        hx-swap="innerHTML"
        hx-disabled-elt="[type=submit]"
        hx-indicator="#htmx-spinner">

    {% csrf_token %}

    <div class="mb-4">
      <label class="block text-xs font-600 text-earth-700 mb-1"
             style="font-weight:600" for="support-subject">Subject</label>
      <input type="text"
             id="support-subject"
             name="subject"
             maxlength="255"
             required
             placeholder="Briefly describe your issue"
             class="w-full px-3 py-2 text-sm border border-earth-200 rounded-lg
                    focus:outline-none focus:border-navy focus:ring-2 focus:ring-navy/10
                    text-earth-900 placeholder-earth-400"
             style="transition:border-color 0.15s">
    </div>

    <div class="mb-4">
      <label class="block text-xs font-600 text-earth-700 mb-1"
             style="font-weight:600" for="support-priority">Priority</label>
      <select id="support-priority"
              name="priority"
              class="w-full px-3 py-2 text-sm border border-earth-200 rounded-lg
                     focus:outline-none focus:border-navy focus:ring-2 focus:ring-navy/10
                     text-earth-900 bg-white">
        <option value="low" {% if priority == 'low' %}selected{% endif %}>Low</option>
        <option value="medium" {% if not priority or priority == 'medium' %}selected{% endif %}>Medium</option>
        <option value="high" {% if priority == 'high' %}selected{% endif %}>High</option>
      </select>
    </div>

    <div class="mb-5">
      <label class="block text-xs font-600 text-earth-700 mb-1"
             style="font-weight:600" for="support-message">Message</label>
      <textarea id="support-message"
                name="message"
                rows="4"
                required
                placeholder="Describe your issue in detail"
                class="w-full px-3 py-2 text-sm border border-earth-200 rounded-lg
                       focus:outline-none focus:border-navy focus:ring-2 focus:ring-navy/10
                       text-earth-900 placeholder-earth-400 resize-none"
                style="transition:border-color 0.15s"></textarea>
    </div>

    <button type="submit"
            class="w-full py-2.5 rounded-lg text-sm font-700 text-white
                   transition-colors disabled:opacity-60"
            style="background:#3d5a99;font-weight:700">
      Submit
    </button>
  </form>
</div>
