<div style="padding:24px">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <div style="width:40px;height:40px;border-radius:12px;
                background:#fef3c7;display:flex;align-items:center;
                justify-content:center;flex-shrink:0">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24"
           stroke="#d97706" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944
                 a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9
                 c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03
                 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
    </div>
    <div>
      <h3 style="font-size:15px;font-weight:800;color:#1a2744;
                 margin-bottom:2px">Log Health Observation</h3>
      <p style="font-size:11px;color:#8a96a8">
        Record symptoms for this batch
      </p>
    </div>
  </div>

  {% if error %}
  <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;
              padding:10px 12px;font-size:12px;color:#dc2626;margin-bottom:12px">
    {{ error }}
  </div>
  {% endif %}

  <form hx-post="{% url 'health:symptom_log' batch_pk %}"
        hx-target="#modal-body"
        hx-swap="innerHTML">
    {% csrf_token %}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;
                margin-bottom:12px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Affected Birds *
        </label>
        <input type="number" name="affected_count" min="1" required
               placeholder="0"
               style="width:100%;padding:9px 12px;
                      border:1.5px solid #e2e8f0;border-radius:9px;
                      font-size:13px;box-sizing:border-box;outline:none"
               onfocus="this.style.borderColor='#d97706'"
               onblur="this.style.borderColor='#e2e8f0'">
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Severity
        </label>
        <select name="severity"
                style="width:100%;padding:9px 12px;
                       border:1.5px solid #e2e8f0;border-radius:9px;
                       font-size:13px;box-sizing:border-box;
                       background:white;outline:none"
                onfocus="this.style.borderColor='#d97706'"
                onblur="this.style.borderColor='#e2e8f0'">
          <option value="mild">Mild &mdash; Monitoring only</option>
          <option value="moderate">Moderate &mdash; Needs attention</option>
          <option value="severe">Severe &mdash; Immediate action</option>
        </select>
      </div>
    </div>

    <div style="margin-bottom:12px">
      <label style="display:block;font-size:11px;font-weight:700;
                    color:#4a5568;margin-bottom:8px;
                    text-transform:uppercase;letter-spacing:0.05em">
        Symptoms Observed
      </label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        {% for symptom, label in symptoms_choices %}
        <label style="display:flex;align-items:center;gap:8px;
                      padding:8px 10px;border:1.5px solid #e2e8f0;
                      border-radius:8px;cursor:pointer;font-size:12px;
                      color:#1a2744;transition:all 0.15s;background:white"
               onmouseover="this.style.borderColor='#d97706';
                            this.style.background='#fffbeb'"
               onmouseout="if(!this.querySelector('input').checked){
                             this.style.borderColor='#e2e8f0';
                             this.style.background='white'}">
          <input type="checkbox" name="symptoms" value="{{ symptom }}"
                 style="accent-color:#d97706"
                 onchange="this.closest('label').style.borderColor=
                   this.checked?'#d97706':'#e2e8f0';
                   this.closest('label').style.background=
                   this.checked?'#fffbeb':'white'">
          {{ label }}
        </label>
        {% endfor %}
      </div>
    </div>

    <div style="margin-bottom:18px">
      <label style="display:block;font-size:11px;font-weight:700;
                    color:#4a5568;margin-bottom:5px;
                    text-transform:uppercase;letter-spacing:0.05em">
        Treatment Notes (optional)
      </label>
      <textarea name="treatment_notes" rows="2"
                placeholder="Describe what you observed or treatment given..."
                style="width:100%;padding:9px 12px;
                       border:1.5px solid #e2e8f0;border-radius:9px;
                       font-size:13px;resize:vertical;
                       box-sizing:border-box;outline:none"
                onfocus="this.style.borderColor='#d97706'"
                onblur="this.style.borderColor='#e2e8f0'">
      </textarea>
    </div>

    <div style="display:flex;gap:10px">
      <button type="button"
              @click="$dispatch('close-modal')"
              style="flex:1;padding:11px;background:#f4f7fe;
                     color:#4a5568;border:1.5px solid #e2e8f0;
                     border-radius:10px;font-size:13px;
                     font-weight:600;cursor:pointer">
        Cancel
      </button>
      <button type="submit"
              style="flex:2;padding:11px;background:#d97706;
                     color:white;border:none;border-radius:10px;
                     font-size:13px;font-weight:700;cursor:pointer;
                     transition:background 0.15s"
              onmouseover="this.style.background='#b45309'"
              onmouseout="this.style.background='#d97706'">
        Log Observation
      </button>
    </div>
  </form>
</div>
