<div style="padding:24px">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <div style="width:40px;height:40px;border-radius:12px;
                background:#edfae8;display:flex;align-items:center;
                justify-content:center;flex-shrink:0">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24"
           stroke="#16a34a" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
      </svg>
    </div>
    <div>
      <h3 style="font-size:15px;font-weight:800;color:#1a2744;
                 margin-bottom:2px">Log Medication</h3>
      <p style="font-size:11px;color:#8a96a8">
        Record drug or treatment administered
      </p>
    </div>
  </div>

  {% if error %}
  <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;
              padding:10px 12px;font-size:12px;color:#dc2626;margin-bottom:12px">
    {{ error }}
  </div>
  {% endif %}

  <form hx-post="{% url 'health:medication_log' batch_pk %}"
        hx-target="#modal-body"
        hx-swap="innerHTML">
    {% csrf_token %}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;
                margin-bottom:12px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Drug Name *
        </label>
        <input type="text" name="drug_name" required
               placeholder="e.g. Tylosin, Gumboro"
               style="width:100%;padding:9px 12px;
                      border:1.5px solid #e2e8f0;border-radius:9px;
                      font-size:13px;box-sizing:border-box;outline:none"
               onfocus="this.style.borderColor='#16a34a'"
               onblur="this.style.borderColor='#e2e8f0'">
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Drug Type *
        </label>
        <select name="drug_type"
                style="width:100%;padding:9px 12px;
                       border:1.5px solid #e2e8f0;border-radius:9px;
                       font-size:13px;box-sizing:border-box;
                       background:white;outline:none"
                onfocus="this.style.borderColor='#16a34a'"
                onblur="this.style.borderColor='#e2e8f0'">
          <option value="antibiotic">Antibiotic</option>
          <option value="antiviral">Antiviral</option>
          <option value="antifungal">Antifungal</option>
          <option value="antiparasitic">Antiparasitic</option>
          <option value="vitamin">Vitamin</option>
          <option value="vaccine">Vaccine</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;
                margin-bottom:12px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Start Date *
        </label>
        <input type="date" name="start_date" required
               style="width:100%;padding:9px 12px;
                      border:1.5px solid #e2e8f0;border-radius:9px;
                      font-size:13px;box-sizing:border-box;outline:none"
               onfocus="this.style.borderColor='#16a34a'"
               onblur="this.style.borderColor='#e2e8f0'">
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Duration (days) *
        </label>
        <input type="number" name="duration_days" min="1" required
               placeholder="e.g. 5"
               style="width:100%;padding:9px 12px;
                      border:1.5px solid #e2e8f0;border-radius:9px;
                      font-size:13px;box-sizing:border-box;outline:none"
               onfocus="this.style.borderColor='#16a34a'"
               onblur="this.style.borderColor='#e2e8f0'">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;
                margin-bottom:12px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Dosage *
        </label>
        <input type="text" name="dosage" required
               placeholder="e.g. 1ml per litre"
               style="width:100%;padding:9px 12px;
                      border:1.5px solid #e2e8f0;border-radius:9px;
                      font-size:13px;box-sizing:border-box;outline:none"
               onfocus="this.style.borderColor='#16a34a'"
               onblur="this.style.borderColor='#e2e8f0'">
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Withdrawal (days)
        </label>
        <input type="number" name="withdrawal_period_days" min="0" value="0"
               style="width:100%;padding:9px 12px;
                      border:1.5px solid #e2e8f0;border-radius:9px;
                      font-size:13px;box-sizing:border-box;outline:none"
               onfocus="this.style.borderColor='#16a34a'"
               onblur="this.style.borderColor='#e2e8f0'">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;
                margin-bottom:12px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Quantity Used *
        </label>
        <input type="number" step="0.01" name="quantity_used" required
               placeholder="0.00"
               style="width:100%;padding:9px 12px;
                      border:1.5px solid #e2e8f0;border-radius:9px;
                      font-size:13px;box-sizing:border-box;outline:none"
               onfocus="this.style.borderColor='#16a34a'"
               onblur="this.style.borderColor='#e2e8f0'">
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Unit *
        </label>
        <select name="unit"
                style="width:100%;padding:9px 12px;
                       border:1.5px solid #e2e8f0;border-radius:9px;
                       font-size:13px;box-sizing:border-box;
                       background:white;outline:none"
                onfocus="this.style.borderColor='#16a34a'"
                onblur="this.style.borderColor='#e2e8f0'">
          <option value="ml">ml</option>
          <option value="g">g</option>
          <option value="tablets">Tablets</option>
          <option value="sachets">Sachets</option>
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;
                margin-bottom:18px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Cost (&#8358;)
        </label>
        <input type="number" step="0.01" name="cost" value="0"
               style="width:100%;padding:9px 12px;
                      border:1.5px solid #e2e8f0;border-radius:9px;
                      font-size:13px;box-sizing:border-box;outline:none"
               onfocus="this.style.borderColor='#16a34a'"
               onblur="this.style.borderColor='#e2e8f0'">
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Vet Name
        </label>
        <input type="text" name="vet_name" placeholder="Optional"
               style="width:100%;padding:9px 12px;
                      border:1.5px solid #e2e8f0;border-radius:9px;
                      font-size:13px;box-sizing:border-box;outline:none"
               onfocus="this.style.borderColor='#16a34a'"
               onblur="this.style.borderColor='#e2e8f0'">
      </div>
    </div>

    <div style="display:flex;gap:10px">
      <button type="button"
              @click="$dispatch('close-modal')"
              style="flex:1;padding:11px;background:#f4f7fe;
                     color:#4a5568;border:1.5px solid #e2e8f0;
                     border-radius:10px;font-size:13px;
                     font-weight:600;cursor:pointer">
        Cancel
      </button>
      <button type="submit"
              style="flex:2;padding:11px;background:#16a34a;
                     color:white;border:none;border-radius:10px;
                     font-size:13px;font-weight:700;cursor:pointer;
                     transition:background 0.15s"
              onmouseover="this.style.background='#15803d'"
              onmouseout="this.style.background='#16a34a'">
        Record Medication
      </button>
    </div>
  </form>
</div>
