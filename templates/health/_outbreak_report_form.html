<div style="padding:24px">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <div style="width:40px;height:40px;border-radius:12px;
                background:#fee2e2;display:flex;
                align-items:center;justify-content:center;
                font-size:20px">🚨</div>
    <div>
      <h3 style="font-size:15px;font-weight:800;color:#1a2744;margin-bottom:2px">
        Report Outbreak
      </h3>
      <p style="font-size:11px;color:#8a96a8">
        Log a disease outbreak for immediate attention
      </p>
    </div>
  </div>

  {% if error %}
  <div style="background:#fee2e2;color:#991b1b;padding:10px 14px;
              border-radius:9px;font-size:12px;margin-bottom:14px">
    {{ error }}
  </div>
  {% endif %}

  <form hx-post="{% url 'health:report_outbreak' %}"
        hx-target="#modal-body"
        hx-swap="innerHTML"
      hx-indicator="#htmx-spinner">
    {% csrf_token %}

    <div style="margin-bottom:12px">
      <label style="display:block;font-size:11px;font-weight:700;
                    color:#4a5568;margin-bottom:5px;
                    text-transform:uppercase;letter-spacing:0.05em">
        Disease / Condition *
      </label>
      <input type="text" name="disease_name" required
             placeholder="e.g. Newcastle Disease, Gumboro, Coccidiosis"
             style="width:100%;padding:9px 12px;
                    border:1.5px solid #e2e8f0;border-radius:9px;
                    font-size:13px;box-sizing:border-box;outline:none"
             onfocus="this.style.borderColor='#dc2626'"
             onblur="this.style.borderColor='#e2e8f0'">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Affected Farm *
        </label>
        <select name="farm" required
                style="width:100%;padding:9px 12px;
                       border:1.5px solid #e2e8f0;border-radius:9px;
                       font-size:13px;background:white;
                       box-sizing:border-box;outline:none"
                onfocus="this.style.borderColor='#dc2626'"
                onblur="this.style.borderColor='#e2e8f0'">
          <option value="">-- Select Farm --</option>
          {% for farm in farms %}
          <option value="{{ farm.pk }}">{{ farm.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;
                      color:#4a5568;margin-bottom:5px;
                      text-transform:uppercase;letter-spacing:0.05em">
          Severity
        </label>
        <select name="severity"
                style="width:100%;padding:9px 12px;
                       border:1.5px solid #e2e8f0;border-radius:9px;
                       font-size:13px;background:white;
                       box-sizing:border-box;outline:none"
                onfocus="this.style.borderColor='#dc2626'"
                onblur="this.style.borderColor='#e2e8f0'">
          <option value="warning">⚠️ Warning</option>
          <option value="critical">🔴 Critical</option>
          <option value="info">ℹ️ Low / Monitoring</option>
        </select>
      </div>
    </div>

    <div style="margin-bottom:18px">
      <label style="display:block;font-size:11px;font-weight:700;
                    color:#4a5568;margin-bottom:5px;
                    text-transform:uppercase;letter-spacing:0.05em">
        Description
      </label>
      <textarea name="description" rows="3"
                placeholder="Describe symptoms, affected birds, first observed..."
                style="width:100%;padding:9px 12px;
                       border:1.5px solid #e2e8f0;border-radius:9px;
                       font-size:13px;resize:vertical;
                       box-sizing:border-box;outline:none"
                onfocus="this.style.borderColor='#dc2626'"
                onblur="this.style.borderColor='#e2e8f0'">
      </textarea>
    </div>

    <div style="background:#fff5f5;border:1px solid #fecaca;
                border-radius:9px;padding:10px 14px;
                margin-bottom:16px;font-size:12px;color:#991b1b">
      ⚠️ Reporting an outbreak will create a critical alert
      visible to all managers on your account.
    </div>

    <div style="display:flex;gap:10px">
      <button type="button" onclick="closeModal()"
              style="flex:1;padding:11px;background:#f4f7fe;
                     color:#4a5568;border:1.5px solid #e2e8f0;
                     border-radius:10px;font-size:13px;
                     font-weight:600;cursor:pointer">
        Cancel
      </button>
      <button type="submit"
              style="flex:2;padding:11px;background:#dc2626;
                     color:white;border:none;border-radius:10px;
                     font-size:13px;font-weight:700;cursor:pointer;
                     transition:background 0.15s"
              onmouseover="this.style.background='#b91c1c'"
              onmouseout="this.style.background='#dc2626'"
        hx-disabled-elt="this">
        🚨 Report Outbreak
      </button>
    </div>
  </form>
</div>
