<div id="medication-form">
  {% if error %}<p class="text-red-600 mb-2">{{ error }}</p>{% endif %}
  <form hx-post="{% url 'health:medication_log' batch_pk %}"
        hx-target="#medication-list"
        hx-swap="outerHTML"
      hx-indicator="#htmx-spinner">
    {% csrf_token %}
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium">Drug Name</label>
        <input name="drug_name" required class="w-full border rounded px-2 py-1 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium">Drug Type</label>
        <select name="drug_type" class="w-full border rounded px-2 py-1 text-sm">
          <option value="antibiotic">Antibiotic</option>
          <option value="antiviral">Antiviral</option>
          <option value="antifungal">Antifungal</option>
          <option value="antiparasitic">Antiparasitic</option>
          <option value="vitamin">Vitamin</option>
          <option value="vaccine">Vaccine</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium">Start Date</label>
        <input type="date" name="start_date" required class="w-full border rounded px-2 py-1 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium">Duration (days)</label>
        <input type="number" name="duration_days" min="1" required class="w-full border rounded px-2 py-1 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium">Withdrawal Period (days)</label>
        <input type="number" name="withdrawal_period_days" min="0" value="0" class="w-full border rounded px-2 py-1 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium">Dosage</label>
        <input name="dosage" required class="w-full border rounded px-2 py-1 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium">Quantity Used</label>
        <input type="number" step="0.01" name="quantity_used" required class="w-full border rounded px-2 py-1 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium">Unit</label>
        <select name="unit" class="w-full border rounded px-2 py-1 text-sm">
          <option value="ml">ml</option>
          <option value="g">g</option>
          <option value="tablets">Tablets</option>
          <option value="sachets">Sachets</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium">Cost (₦)</label>
        <input type="number" step="0.01" name="cost" value="0" class="w-full border rounded px-2 py-1 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium">Vet Name</label>
        <input name="vet_name" class="w-full border rounded px-2 py-1 text-sm">
      </div>
    </div>
    <button type="submit" class="mt-3 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm"
        hx-disabled-elt="this">
      Record Medication
    </button>
  </form>
</div>
