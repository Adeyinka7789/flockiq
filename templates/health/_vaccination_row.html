<tr id="vacc-row-{{ vacc.id }}" class="border-b {% if vacc.is_overdue %}bg-red-50{% endif %}">
  {% if vacc %}
  <td class="p-2">{{ vacc.vaccine_name }}</td>
  <td class="p-2">{{ vacc.batch }}</td>
  <td class="p-2">{{ vacc.farm }}</td>
  <td class="p-2 {% if vacc.is_overdue %}text-red-600 font-semibold{% endif %}">
    {{ vacc.due_date }}
    {% if vacc.is_overdue %}<span class="ml-1 text-xs text-red-500">OVERDUE</span>{% endif %}
  </td>
  <td class="p-2">
    <span class="px-2 py-1 rounded text-xs
      {% if vacc.status == 'completed' %}bg-green-100 text-green-800
      {% elif vacc.status == 'missed' %}bg-red-100 text-red-800
      {% elif vacc.status == 'skipped' %}bg-gray-100 text-gray-600
      {% else %}bg-yellow-100 text-yellow-800{% endif %}">
      {{ vacc.get_status_display }}
    </span>
  </td>
  <td class="p-2">
    {% if vacc.status == 'scheduled' %}
    <button
      hx-post="{% url 'health:complete' vacc.id %}"
      hx-target="#vacc-row-{{ vacc.id }}"
      hx-swap="outerHTML"
      class="px-3 py-1 bg-green-600 text-white text-sm rounded hover:bg-green-700">
      Mark Done
    </button>
    {% endif %}
  </td>
  {% else %}
  <td colspan="6" class="p-2 text-red-600">{{ error }}</td>
  {% endif %}
</tr>
