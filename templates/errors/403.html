{% extends "base.html" %}
{% block content %}
<div class="flex flex-col items-center justify-center
            min-h-96 text-center px-4">
  <div class="w-16 h-16 bg-red-100 rounded-full
              flex items-center justify-center mb-4">
    <svg class="w-8 h-8 text-red-500" fill="none" viewBox="0 0 24 24"
         stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
    </svg>
  </div>
  <h1 style="font-family: Manrope, sans-serif;
             font-size: 1.5rem; font-weight: 800;
             color: #234280; margin-bottom: 0.5rem;">
    Access Restricted
  </h1>
  <p class="text-sm text-gray-500 mb-6 max-w-sm">
    Your role
    <span class="font-semibold text-gray-700">
      ({{ role|title }})
    </span>
    does not have permission to view this page.
    Contact your farm owner if you need access.
  </p>
  <a href="/"
     class="px-4 py-2.5 rounded-xl text-sm font-medium
            text-white transition"
     style="background: linear-gradient(
              135deg, #234280 0%, #2d5099 100%
            );">
    Back to Dashboard
  </a>
</div>
{% endblock %}
