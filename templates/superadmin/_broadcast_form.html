<div style="padding:24px">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <div style="width:40px;height:40px;border-radius:12px;background:#e8eef8;
                display:flex;align-items:center;justify-content:center;font-size:20px">&#128226;</div>
    <div>
      <h3 style="font-size:15px;font-weight:800;color:#1a2744;margin-bottom:2px">Send Broadcast</h3>
      <p style="font-size:11px;color:#8a96a8">Send announcement to all tenants</p>
    </div>
  </div>

  {% if error %}
  <div style="background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:9px;
              font-size:12px;margin-bottom:14px">
    {{ error }}
  </div>
  {% endif %}

  <form hx-post="{% url 'superadmin:broadcast' %}"
        hx-target="#modal-body"
        hx-swap="innerHTML">
    {% csrf_token %}

    <div style="margin-bottom:12px">
      <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                    margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">
        Title *
      </label>
      <input type="text" name="title" required
             placeholder="e.g. Scheduled Maintenance — June 10"
             style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:9px;
                    font-size:13px;box-sizing:border-box;outline:none"
             onfocus="this.style.borderColor='#3d5a99'"
             onblur="this.style.borderColor='#e2e8f0'">
    </div>

    <div style="margin-bottom:12px">
      <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                    margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">
        Message *
      </label>
      <textarea name="message" rows="4" required
                placeholder="Write your announcement here..."
                style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:9px;
                       font-size:13px;resize:vertical;box-sizing:border-box;outline:none"
                onfocus="this.style.borderColor='#3d5a99'"
                onblur="this.style.borderColor='#e2e8f0'">
      </textarea>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                      margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">
          Audience
        </label>
        <select name="audience"
                style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:9px;
                       font-size:13px;background:white;outline:none;box-sizing:border-box"
                onfocus="this.style.borderColor='#3d5a99'"
                onblur="this.style.borderColor='#e2e8f0'">
          <option value="owners_managers">Owners &amp; Managers ({{ counts.owners_managers }})</option>
          <option value="owners">Owners Only ({{ counts.owners }})</option>
          <option value="managers">Managers Only ({{ counts.managers }})</option>
          <option value="all">All Users ({{ counts.all }})</option>
        </select>
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:#4a5568;
                      margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">
          Channel
        </label>
        <select name="channel"
                style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:9px;
                       font-size:13px;background:white;outline:none;box-sizing:border-box"
                onfocus="this.style.borderColor='#3d5a99'"
                onblur="this.style.borderColor='#e2e8f0'">
          <option value="both">In-App + Email</option>
          <option value="in_app">In-App Only</option>
          <option value="email">Email Only</option>
        </select>
      </div>
    </div>

    <div style="background:#f4f7fe;border-radius:10px;padding:12px 14px;
                margin-bottom:16px;font-size:12px;color:#4a5568">
      <strong style="color:#1a2744">Preview:</strong>
      This will send to <strong id="audience-preview">owners &amp; managers</strong> via
      <strong id="channel-preview">in-app + email</strong>.
    </div>

    <div style="display:flex;gap:10px">
      <button type="button" onclick="closeModal()"
              style="flex:1;padding:11px;background:#f4f7fe;color:#4a5568;
                     border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;
                     font-weight:600;cursor:pointer">
        Cancel
      </button>
      <button type="submit"
              style="flex:2;padding:11px;background:#3d5a99;color:white;border:none;
                     border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;
                     transition:background 0.15s"
              onmouseover="this.style.background='#2d4578'"
              onmouseout="this.style.background='#3d5a99'">
        &#128226; Send Broadcast
      </button>
    </div>
  </form>
</div>
