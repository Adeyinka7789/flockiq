<div class="p-6 text-center">
  <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3">
    <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
  </div>
  <h3 class="font-semibold text-gray-900 mb-1">Account Suspended</h3>
  <p class="text-sm text-gray-500 mb-4">
    {{ org.name }} has been suspended.
    {% if owner %}An email has been sent to {{ owner.email }}.{% endif %}
  </p>
  <button @click="$dispatch('close-modal'); window.location.reload()"
          class="px-4 py-2 text-sm font-medium text-white bg-gray-800 rounded-lg">
    Done
  </button>
</div>
