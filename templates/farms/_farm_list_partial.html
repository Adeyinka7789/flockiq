{% if farms %}
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for farm in farms %}
      {% include "farms/_farm_card.html" %}
    {% endfor %}
  </div>
{% else %}
  <div class="text-center py-20">
    <div class="w-16 h-16 bg-navy-light rounded-2xl flex items-center
                justify-center mx-auto mb-4">
      <svg class="w-8 h-8" style="stroke:#3d5a99" fill="none"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5"/>
      </svg>
    </div>
    <h3 class="text-lg font-semibold text-gray-800 mb-1">No farms yet</h3>
    <p class="text-gray-500 text-sm mb-6">Add your first farm to get started</p>
    <button hx-get="{% url 'farms:create' %}"
            hx-target="#modal-container"
            hx-swap="innerHTML"
            class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl
                   text-white text-sm font-semibold"
            style="background:#3d5a99">
      + Add Your First Farm
    </button>
  </div>
{% endif %}
