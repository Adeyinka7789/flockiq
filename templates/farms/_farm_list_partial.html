{% if farms %}
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for farm in farms %}
      {% include "farms/_farm_card.html" %}
    {% endfor %}
  </div>
{% else %}
  <div class="text-center py-16 bg-white rounded-xl border border-dashed border-gray-200">
    <svg class="mx-auto w-10 h-10 text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/>
    </svg>
    <p class="text-gray-400 text-sm">No farms yet. Add your first farm to get started.</p>
  </div>
{% endif %}
