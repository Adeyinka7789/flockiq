<div style="padding:20px;text-align:center">
  <div style="width:48px;height:48px;background:#f0fdf4;border-radius:50%;
              display:flex;align-items:center;justify-content:center;
              margin:0 auto 12px;font-size:22px">
    ✅
  </div>
  <h4 style="font-size:14px;font-weight:700;color:#1a2744;margin:0 0 6px">
    Price Reported!
  </h4>
  <p style="font-size:12px;color:#6b7280;margin:0 0 16px;line-height:1.5">
    <strong>{{ feed_type }}</strong> at <strong>₦{{ price }}</strong> in <strong>{{ state }}</strong>
    has been recorded. Thank you for helping fellow farmers!
  </p>
  <button onclick="location.reload()"
          style="padding:9px 18px;background:#3d5a99;color:white;border:none;
                 border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">
    View updated prices
  </button>
</div>
