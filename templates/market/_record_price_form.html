<div class="p-6">
  <div class="flex items-center justify-between mb-5">
    <h3 class="font-bold text-base" style="color:#1a2744">Record Market Price</h3>
    <button @click="$dispatch('close-modal')"
            class="text-gray-400 hover:text-gray-600">✕</button>
  </div>
  <form hx-post="{% url 'market:record_price' %}"
        hx-target="#modal-body"
        class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Product</label>
      <select name="product_type"
              class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm
                     focus:outline-none focus:border-blue-400">
        <option value="eggs">Eggs</option>
        <option value="live_birds">Live Birds</option>
        <option value="spent_layers">Spent Layers</option>
        <option value="feed">Feed</option>
      </select>
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">
        Price (₦)
      </label>
      <input type="number" name="price_naira" step="0.01" placeholder="e.g. 1800"
             class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm
                    focus:outline-none focus:border-blue-400">
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Unit</label>
      <input type="text" name="unit" placeholder="e.g. per crate, per kg"
             class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm
                    focus:outline-none focus:border-blue-400">
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Market Name</label>
      <input type="text" name="market_name" placeholder="e.g. Mile 12 Market"
             class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm
                    focus:outline-none focus:border-blue-400">
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Region</label>
      <input type="text" name="region" placeholder="Lagos" value="Lagos"
             class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm
                    focus:outline-none focus:border-blue-400">
    </div>
    {% if error %}
    <p class="text-red-500 text-sm">{{ error }}</p>
    {% endif %}
    <button type="submit"
            class="w-full py-2.5 rounded-xl text-white text-sm font-semibold mt-2"
            style="background:#3d5a99">
      Save Price
    </button>
  </form>
</div>
