<div class="flex flex-wrap gap-4 p-3 bg-gray-50 border-b border-gray-200">
  {% for price in prices %}
  <div class="flex items-center gap-2 text-sm">
    <span class="font-medium text-gray-700">{{ price.get_product_type_display }}</span>
    <span class="text-indigo-600 font-semibold">₦{{ price.price_per_unit_naira|floatformat:2 }}/{{ price.unit }}</span>
    <span class="text-xs text-gray-400">{{ price.market_name }}</span>
    <span class="text-xs text-gray-300">{{ price.date }}</span>
  </div>
  {% empty %}
  <p class="text-sm text-gray-400">No market prices recorded yet.</p>
  {% endfor %}
</div>
